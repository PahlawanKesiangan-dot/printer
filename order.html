<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Nando Print - Command Centre</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 20px; color: #1a1a1a; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #667eea; padding-bottom: 15px; }
        .header h1 { margin: 0; color: #4b6cb7; letter-spacing: -1px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        thead { background: #4b6cb7; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        
        .photo-grid { display: flex; gap: 5px; flex-wrap: wrap; max-width: 250px; }
        .img-thumb { 
            width: 50px; height: 50px; object-fit: cover; border-radius: 6px; 
            cursor: pointer; border: 2px solid transparent;
        }
        .img-thumb:hover { border-color: #667eea; transform: scale(1.1); }

        .badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; color: white; }
        .bg-antri { background: #adb5bd; }
        .bg-proses { background: #f39c12; }
        .bg-selesai { background: #27ae60; }

        .btn-action { padding: 8px 12px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: 600; font-size: 12px; margin-right: 5px; }
        .btn-wa { background: #25d366; }
        .btn-del { background: #e74c3c; }

        .omzet-box { margin-top: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* ==========================================
           FITUR FIX PRINT: CSS KHUSUS CETAK
        ========================================== */
        #printArea { display: none; } /* Sembunyi di layar biasa */

        @media print {
            /* Sembunyikan SEMUA elemen kecuali area print */
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            
            #printArea { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                display: block !important;
                text-align: center;
            }

            #printArea img { 
                max-width: 100%; 
                height: auto; 
                margin: 0 auto;
                display: block;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚀 Nando Print - Command Center</h1>
        <p>Manajemen Pesanan & Cetak Otomatis (Anti-Zonk)</p>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Nama Pelanggan</th>
                    <th>Ukuran/Jenis</th>
                    <th>File (Klik utk Cetak)</th>
                    <th>Status</th>
                    <th>Total Biaya</th>
                    <th>Tindakan</th>
                </tr>
            </thead>
            <tbody id="listOrder">
                </tbody>
        </table>
    </div>

    <div class="omzet-box">
        <div>
            <h3 style="margin:0; opacity: 0.8; font-size: 14px;">TOTAL PENDAPATAN HARI INI</h3>
            <h2 style="margin:5px 0 0; font-size: 32px;">Rp <span id="omzet">0</span></h2>
        </div>
        <div style="text-align: right;">
            <p style="margin:0; font-size: 12px;">PIN Aktif: <strong>900</strong></p>
        </div>
    </div>
</div>

<div id="printArea"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB4CBP0S3dhsxFb17ToVhFFF7Kvjw_7j88",
        authDomain: "print-nndo.firebaseapp.com",
        databaseURL: "https://print-nndo-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "print-nndo",
        storageBucket: "print-nndo.firebasestorage.app",
        appId: "1:1030448319199:web:1c2680491f95760e88776a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const rootRef = db.ref('pesanan_nando');
    const PIN_ADMIN = "900";

    rootRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('listOrder');
        const today = new Date().toLocaleDateString('en-CA');
        let omzetHariIni = 0;
        
        tbody.innerHTML = "";

        if (data) {
            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                if(item.date === today) omzetHariIni += (item.total || 0);

                const statusClass = item.status === "Antri" ? "bg-antri" : (item.status === "Proses" ? "bg-proses" : "bg-selesai");
                
                let photoHTML = "📄";
                if (item.fotos && Array.isArray(item.fotos)) {
                    photoHTML = `<div class="photo-grid">` + 
                        item.fotos.map(img => `<img src="${img}" class="img-thumb" onclick="cetakSekarang('${img}')" title="Klik untuk Cetak">`).join('') + 
                        `</div>`;
                } else if (item.foto) {
                    photoHTML = `<img src="${item.foto}" class="img-thumb" onclick="cetakSekarang('${item.foto}')" title="Klik untuk Cetak">`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${new Date(item.targetTime - (10 * 60000)).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                        <td><strong>${item.nama}</strong><br><small>${item.telp}</small></td>
                        <td><span style="color:#4b6cb7; font-weight:600">${item.jenis || 'A4'}</span><br><small>${item.qty || 1} Lembar</small></td>
                        <td>${photoHTML}</td>
                        <td><button class="badge ${statusClass}" onclick="ubahStatus('${key}', '${item.status}')">${item.status}</button></td>
                        <td>Rp ${(item.total || 0).toLocaleString()}</td>
                        <td>
                            <button class="btn-action btn-wa" onclick="kontakWA('${item.telp}', '${item.nama}', '${item.status}')">WA</button>
                            <button class="btn-action btn-del" onclick="hapusPesanan('${key}')">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }
        document.getElementById('omzet').innerText = omzetHariIni.toLocaleString();
    });

    /* ==========================================
       FITUR FIX: LOGIKA CETAK ANTI-BLANK
    ========================================== */
    function cetakSekarang(url) {
        const printArea = document.getElementById('printArea');
        
        // Buat elemen gambar sementara
        printArea.innerHTML = `<img src="${url}" id="imgToPrint">`;
        
        const img = document.getElementById('imgToPrint');

        // Tunggu gambar selesai dimuat oleh browser
        img.onload = function() {
            // Kasih jeda sedikit lagi biar browser bener-bener siap render preview
            setTimeout(() => {
                window.print();
                printArea.innerHTML = ""; // Bersihkan setelah selesai
            }, 300);
        };

        img.onerror = function() {
            alert("Waduh, Master! Gambarnya gagal dimuat. Coba cek koneksi atau database lu.");
        };
    }

    function ubahStatus(key, statusLama) {
        const pin = prompt("Konfirmasi PIN Admin:");
        if (pin !== PIN_ADMIN) return alert("PIN Salah!");
        let statusBaru = statusLama === "Antri" ? "Proses" : (statusLama === "Proses" ? "Selesai" : "Antri");
        rootRef.child(key).update({ status: statusBaru });
    }

    function hapusPesanan(key) {
        const pin = prompt("Masukkan PIN Admin untuk menghapus:");
        if (pin === PIN_ADMIN) {
            if (confirm("Yakin mau hapus history cuan ini?")) rootRef.child(key).remove();
        } else if (pin !== null) alert("PIN Salah!");
    }

    function kontakWA(telp, nama, status) {
        let hp = telp.replace(/\D/g, '');
        if (hp.startsWith('0')) hp = '62' + hp.slice(1);
        let pesan = `Halo ${nama}, pesanan print kamu sedang kami *${status}*.`;
        if(status === "Selesai") pesan = `Halo ${nama}, pesanan print kamu sudah *SELESAI*. Silakan diambil ya!`;
        window.open(`https://wa.me/${hp}?text=${encodeURIComponent(pesan)}`, '_blank');
    }
</script>

</body>
</html>
