<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - Nando Print Solutions</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        
        .card { 
            background: white; width: 100%; max-width: 480px; padding: 30px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border-top: 8px solid #667eea; 
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 26px; color: #333; letter-spacing: -1px; }
        .header p { color: #777; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; font-size: 14px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border: 2px solid #edf2f7; 
            border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus { border-color: #667eea; background: #f8faff; }

        .btn-send { 
            width: 100%; padding: 15px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 18px; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-send:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        #previewContainer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .img-preview { width: 100%; height: 70px; object-fit: cover; border-radius: 8px; border: 2px solid #edf2f7; }

        #successCard { display: none; text-align: center; }
        .success-icon { font-size: 60px; color: #27ae60; margin-bottom: 15px; }
        
        /* Gaya untuk opsi yang Sold Out */
        option:disabled { color: #e74c3c; background: #fff5f5; font-style: italic; }
    </style>
</head>
<body>

<div class="card" id="formCard">
    <div class="header">
        <h1>🖨️ Nando Print</h1>
        <p>Solusi Print Kilat Admin Nando</p>
    </div>

    <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="custNama" placeholder="Contoh: Budi Santoso">
    </div>

    <div class="form-group">
        <label>Nomor WhatsApp</label>
        <input type="number" id="custWA" placeholder="08xxxxxxxxxx">
    </div>

    <div class="form-group">
        <label>Pilih Jenis Kertas</label>
        <select id="custJenis">
            <option value="A4" data-harga="1000">HVS A4 (Rp 1.000)</option>
            <option value="F4" data-harga="1000">HVS F4 (Rp 1.000)</option>
            <option value="Foto A4" data-harga="3000">Kertas Foto A4 (Rp 3.000)</option>
        </select>
    </div>

    <div class="form-group">
        <label>📁 Upload File (Bisa pilih banyak)</label>
        <input type="file" id="custFile" accept="image/*" multiple onchange="previewMultiFoto()">
        <div id="previewContainer"></div>
    </div>

    <button class="btn-send" id="btnKirim" onclick="kirimOrder()">🚀 Kirim Pesanan</button>
</div>

<div class="card" id="successCard">
    <div class="success-icon">✅</div>
    <h2>Pesanan Terkirim!</h2>
    <p>Data sudah masuk ke Admin Nando. Silakan tunggu konfirmasi via WA.</p>
    <button class="btn-send" onclick="location.reload()">Kirim Lagi</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB4CBP0S3dhsxFb17ToVhFFF7Kvjw_7j88",
        authDomain: "print-nndo.firebaseapp.com",
        databaseURL: "https://print-nndo-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "print-nndo",
        storageBucket: "print-nndo.firebasestorage.app",
        appId: "1:1030448319199:web:1c2680491f95760e88776a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let multiFiles = [];
    let currentStok = {}; // Variabel lokal untuk simpan status stok

    // 1. MONITOR STOK REAL-TIME
    db.ref('stok_kertas').on('value', (snap) => {
        currentStok = snap.val() || { "A4": true, "F4": true, "Foto A4": true };
        const selectKertas = document.getElementById('custJenis');
        const options = selectKertas.options;

        for (let i = 0; i < options.length; i++) {
            const jenis = options[i].value;
            const isReady = currentStok[jenis];

            if (isReady === false) {
                options[i].disabled = true;
                options[i].text = `${jenis} (SOLD OUT)`;
            } else {
                options[i].disabled = false;
                if (jenis === "A4") options[i].text = "HVS A4 (Rp 1.000)";
                if (jenis === "F4") options[i].text = "HVS F4 (Rp 1.000)";
                if (jenis === "Foto A4") options[i].text = "Kertas Foto A4 (Rp 3.000)";
            }
        }
    });

    // 2. PREVIEW FOTO
    function previewMultiFoto() {
        const files = document.getElementById('custFile').files;
        const container = document.getElementById('previewContainer');
        container.innerHTML = "";
        multiFiles = [];

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onloadend = () => {
                multiFiles.push(reader.result);
                const img = document.createElement('img');
                img.src = reader.result;
                img.className = "img-preview";
                container.appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    }

    // 3. FUNGSI KIRIM (DENGAN VALIDASI AKHIR)
    function kirimOrder() {
        const nama = document.getElementById('custNama').value;
        const telp = document.getElementById('custWA').value;
        const select = document.getElementById('custJenis');
        const jenisTerpilih = select.value;
        const harga = parseInt(select.options[select.selectedIndex].dataset.harga);
        
        // VALIDASI GANDA: Cek lagi status stok sebelum kirim
        if (currentStok[jenisTerpilih] === false) {
            alert("Waduh maaf banget! Kertas " + jenisTerpilih + " baru saja habis (Sold Out). Silakan pilih jenis lain.");
            return; 
        }

        if(!nama || !telp || multiFiles.length === 0) {
            return alert("Lengkapi Nama, WA, dan Foto dulu ya!");
        }

        const btn = document.getElementById('btnKirim');
        btn.disabled = true;
        btn.innerText = "Mengirim data...";

        db.ref('pesanan_nando').push({
            nama: nama,
            telp: telp,
            jenis: jenisTerpilih,
            qty: multiFiles.length,
            total: harga * multiFiles.length,
            fotos: multiFiles,
            status: "Antri",
            date: new Date().toLocaleDateString('en-CA'),
            targetTime: Date.now() + (10 * 60000)
        }).then(() => {
            document.getElementById('formCard').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';
        }).catch(err => {
            alert("Error: " + err);
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
