<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nando Print Solution - Secure Privacy</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* CSS tetap gue pertahankan biar tetep kece */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .main-content { display: grid; grid-template-columns: 1fr 2.5fr; gap: 30px; }
        .input-section { background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .btn-submit { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        thead { background: #667eea; color: white; }
        .foto-thumbnail { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-action { padding: 5px 8px; border-radius: 5px; cursor: pointer; border: none; color: white; font-size: 12px; margin-right: 2px; }
        .btn-view { background: #3498db; }
        .btn-delete { background: #ff4757; }
        .total-section { margin-top: 20px; background: #27ae60; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .preview-box { margin-top: 10px; display: none; text-align: center; }
        #imgPreview { max-width: 100%; border-radius: 8px; border: 2px dashed #667eea; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header" style="text-align: center; border-bottom: 2px solid #667eea; margin-bottom: 20px; padding-bottom: 10px;">
        <h1>🖨️ Nando Print Solution</h1>
        <p>Data Terkunci, Privasi Terjaga, Hati Saja yang Terbuka</p>
    </div>

    <div class="main-content">
        <div class="input-section">
            <h2>📝 Input Pesanan</h2>
            <div class="form-group">
                <label>Nama Pelanggan</label>
                <input type="text" id="namaPelanggan" placeholder="Nama pelanggan...">
            </div>
            <div class="form-group">
                <label>Nomor Telepon (WA)</label>
                <input type="text" id="noTelepon" placeholder="0812xxxx...">
            </div>
            <div class="form-group">
                <label>Jenis Kertas</label>
                <select id="jenisKertas">
                    <option value="" disabled selected>Pilih...</option>
                    <option value="A4" data-harga="1000">A4 (1rb)</option>
                    <option value="F4" data-harga="1000">F4 (1rb)</option>
                    <option value="A4 Foto" data-harga="3000">Foto A4 (3rb)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah Lembar</label>
                <input type="number" id="jumlahLembar" value="1" min="1">
            </div>
            <div class="form-group">
                <label>📷 Upload Foto</label>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFile()">
                <div class="preview-box" id="previewBox"><img id="imgPreview" src=""></div>
            </div>
            <button class="btn-submit" onclick="tambahKeCloud()">🚀 Simpan ke Cloud</button>
        </div>

        <div class="output-section">
            <h2>📋 Riwayat Transaksi (Privasi Aktif 🔒)</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nama</th>
                            <th>No. Telp</th>
                            <th>Jenis</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelBody"></tbody>
                </table>
            </div>
            <div class="total-section">
                <span>Total Omzet:</span>
                <span style="font-size: 1.5em; font-weight: bold;">Rp <span id="totalDisplay">0</span></span>
            </div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN CONFIG FIREBASE LU DI SINI
    const firebaseConfig = {
        apiKey: "AIzaSyB4CBP0S3dhsxFb17ToVhFFF7Kvjw_7j88",
        authDomain: "print-nndo.firebaseapp.com",
        databaseURL: "https://print-nndo-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "print-nndo",
        storageBucket: "print-nndo.firebasestorage.app",
        messagingSenderId: "1030448319199",
        appId: "1:1030448319199:web:1c2680491f95760e88776a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const shopRef = db.ref('pesanan_nando');

    let base64Image = "";
    const ADMIN_PIN = "2509"; // PIN LU, JANGAN SAMPE LUPA KAYAK LUPA JANJI MANIS DIA!

    function handleFile() {
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            base64Image = reader.result;
            document.getElementById('imgPreview').src = base64Image;
            document.getElementById('previewBox').style.display = 'block';
        };
        if (file) reader.readAsDataURL(file);
    }

    function tambahKeCloud() {
        const nama = document.getElementById('namaPelanggan').value.trim();
        const telp = document.getElementById('noTelepon').value.trim();
        const select = document.getElementById('jenisKertas');
        const qty = parseInt(document.getElementById('jumlahLembar').value);

        if (!nama || !telp || select.selectedIndex === 0) {
            alert("Data belum lengkap, Ngab! Jangan setengah-setengah kalau sayang.");
            return;
        }

        const harga = parseInt(select.options[select.selectedIndex].getAttribute('data-harga'));
        
        shopRef.push({
            nama: nama,
            telp: telp,
            jenis: select.value,
            qty: qty,
            total: harga * qty,
            foto: base64Image,
            timestamp: Date.now()
        });

        // Reset
        document.getElementById('namaPelanggan').value = '';
        document.getElementById('noTelepon').value = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('previewBox').style.display = 'none';
        base64Image = "";
        alert("✅ Data Terkirim!");
    }

    shopRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('tabelBody');
        tbody.innerHTML = '';
        let total = 0;

        if (data) {
            Object.keys(data).forEach(key => {
                const item = data[key];
                total += item.total;
                tbody.innerHTML += `
                    <tr>
                        <td>${item.foto ? `<img src="${item.foto}" class="foto-thumbnail">` : '❌'}</td>
                        <td>${item.nama}</td>
                        <td id="telp-${key}">********</td>
                        <td>${item.jenis}</td>
                        <td>${item.qty}</td>
                        <td>Rp ${item.total.toLocaleString()}</td>
                        <td>
                            <button class="btn-action btn-view" onclick="lihatTelp('${key}', '${item.telp}')">Lihat</button>
                            <button class="btn-action btn-delete" onclick="hapusSecure('${key}')">Hapus</button>
                        </td>
                    </tr>`;
            });
        }
        document.getElementById('totalDisplay').innerText = total.toLocaleString();
    });

    function lihatTelp(key, noAsli) {
        const pin = prompt("Masukkan PIN Admin untuk melihat nomor ini:");
        if (pin === ADMIN_PIN) {
            document.getElementById(`telp-${key}`).innerText = noAsli;
        } else if (pin !== null) {
            alert("❌ PIN Salah! Lu mau nyolong nomor pelanggan ya?");
        }
    }

    function hapusSecure(key) {
        const pin = prompt("Masukkan PIN Admin untuk menghapus:");
        if (pin === ADMIN_PIN) {
            if (confirm("Yakin hapus? Data ilang, kenangan tetep ada.")) {
                db.ref('pesanan_nando/' + key).remove();
            }
        } else if (pin !== null) {
            alert("❌ PIN Salah!");
        }
    }
</script>
</body>
</html>
